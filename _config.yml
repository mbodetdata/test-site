# ─────────────────────────────────────────────────────────────────
# BM DATA — Configuration Jekyll
# ─────────────────────────────────────────────────────────────────

title: "BM Data"
tagline: "Conseil en données pour TPE/PME"
description: "BM Data est un consultant data basé à Agen. Il aide les TPE et PME à exploiter leurs données pour prendre de meilleures décisions, optimiser leurs performances et gagner du temps."
# ─── DÉPLOIEMENT ───────────────────────────────────────────────
# Domaine personnalisé bmdata.fr → baseurl: "" / url: "https://bmdata.fr"
# GitHub Pages sans domaine custom → baseurl: "/test-site" / url: "https://mbodetdata.github.io"
#
# Version TEST (GitHub Pages sans domaine custom) :
# baseurl: "/test-site"
# url: "https://mbodetdata.github.io"
#
# Décommentez ci-dessous et commentez les lignes ci-dessus quand le domaine custom est actif :
baseurl: ""
# url: "https://bmdata.fr"
url: "https://test.bmdata.fr"
lang: "fr"

# Identité
author:
  name: "Martial Bodet"
  email: "contact@bmdata.fr"
  twitter: "@bmdata_fr"

# Localisation
location:
  city: "Agen"
  region: "Lot-et-Garonne"
  country: "France"
  postal_code: "47000"
  phone: "+33 (0)6 70 21 09 28"
  address: "Agen, 47000, France"

# Réseaux sociaux
social:
  linkedin: "https://www.linkedin.com/in/martial-bodet/"
  github: "https://github.com/mbodetdata"
  twitter: ""

# SEO & open graph
favicon: "/assets/img/favicon/favicon-32.png"
logo: "/assets/img/logo_112_comp.webp"
og_image: "/assets/img/logo_112_comp.webp"
twitter_card: "summary_large_image"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins (compatibles GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Pagination blog
paginate: 6
paginate_path: "/blog/page:num/"

# Exclusions du build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .gitignore
  - README.md
  - "*.sh"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Martial Bodet"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Timezone
timezone: Europe/Paris

# Feed
feed:
  path: feed.xml
