{% assign g = site.data.global %}

<!-- Schema.org — Organisation + LocalBusiness (toutes les pages) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": ["LocalBusiness", "ProfessionalService"],
      "@id": "{{ site.url }}/#business",
      "name": "{{ g.site_name }}",
      "alternateName": "BM Data - Conseil en données",
      "description": "{{ site.description }}",
      "url": "{{ site.url }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.url }}{{ site.logo }}"
      },
      "image": "{{ site.url }}{{ site.og_image }}",
      "telephone": "{{ g.contact.phone }}",
      "email": "{{ g.contact.email }}",
      "founder": {
        "@type": "Person",
        "name": "Martial Bodet",
        "jobTitle": "Consultant Data",
        "url": "{{ site.url }}/a-propos/"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "{{ g.location.city }}",
        "addressRegion": "{{ g.location.region }}",
        "postalCode": "{{ g.location.postal_code }}",
        "addressCountry": "FR"
      },
      "areaServed": [
        { "@type": "City", "name": "Agen" },
        { "@type": "AdministrativeArea", "name": "Lot-et-Garonne" },
        { "@type": "AdministrativeArea", "name": "Nouvelle-Aquitaine" }
      ],
      "serviceType": [
        "Conseil en données",
        "Tableaux de bord",
        "Analyse de données",
        "Automatisation de reportings",
        "Formation data",
        "Stratégie data"
      ],
      "knowsAbout": [
        "Data analytics",
        "Business Intelligence",
        "Power BI",
        "Google Looker Studio",
        "Python",
        "SQL",
        "TPE PME"
      ],
      "priceRange": "€€",
      "sameAs": [
        "{{ site.social.linkedin }}"
      ]
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "url": "{{ site.url }}",
      "name": "{{ g.site_name }}",
      "description": "{{ site.description }}",
      "inLanguage": "fr-FR",
      "publisher": {
        "@id": "{{ site.url }}/#business"
      }
    }
    {% if page.layout == "post" %},
    {
      "@type": "BlogPosting",
      "headline": "{{ page.title | strip_html }}",
      "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 200 }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": "{{ page.author | default: 'Martial Bodet' }}",
        "url": "{{ site.url }}/a-propos/"
      },
      "publisher": {
        "@id": "{{ site.url }}/#business"
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ page.url | absolute_url }}"
      },
      "inLanguage": "fr-FR"
    }
    {% endif %}
    {% if page.url == "/faq/" or page.url == "/faq" %},
    {
      "@type": "FAQPage",
      "mainEntity": [
        {% assign faq = site.data.faq %}
        {% assign all_questions = "" | split: "" %}
        {% for category in faq.categories %}
          {% for q in category.questions %}
            {% assign all_questions = all_questions | push: q %}
          {% endfor %}
        {% endfor %}
        {% for q in all_questions %}
        {
          "@type": "Question",
          "name": {{ q.question | jsonify }},
          "acceptedAnswer": {
            "@type": "Answer",
            "text": {{ q.answer | jsonify }}
          }
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }
    {% endif %}
  ]
}
</script>
