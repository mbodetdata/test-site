{% assign g   = site.data.global %}
{% assign nav = site.data.navigation %}

<!-- Backdrop menu mobile -->
<div class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></div>

<header class="site-header" role="banner">
  <div class="container header-inner">

    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ g.site_name }} — Retour à l'accueil">
      <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" class="site-logo-img">
    </a>

    <!-- Navigation principale -->
    <nav class="site-nav" id="site-nav" role="navigation" aria-label="Navigation principale">
      {% for item in nav.main %}
      <a href="{{ item.url | relative_url }}"
         class="nav-link{% if item.highlight %} nav-cta{% endif %}{% if page.url == item.url or page.url == item.active_path %} active{% endif %}"
         {% if page.url == item.url or page.url == item.active_path %}aria-current="page"{% endif %}>
        {{ item.label }}
      </a>
      {% endfor %}

      <!-- Hub + séparateur (visibles uniquement en menu mobile) -->
      <div class="nav-mobile-divider" aria-hidden="true"></div>
      <a href="{{ g.hub.url }}" target="_blank" rel="noopener noreferrer"
         class="nav-mobile-hub"
         aria-label="{{ g.hub.label }}">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 6a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3V6Zm-9.75 9.75a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-2.25Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3v-2.25Z" clip-rule="evenodd"/>
        </svg>
        {{ g.hub.label }}
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="nav-mobile-hub-ext" aria-hidden="true">
          <path fill-rule="evenodd" d="M8.914 6.025a.75.75 0 0 1 1.06 0 6 6 0 0 1 0 8.485.75.75 0 0 1-1.06-1.061 4.5 4.5 0 0 0 0-6.364.75.75 0 0 1 0-1.06ZM6.025 8.914a.75.75 0 0 1 0 1.06 4.5 4.5 0 0 0 0 6.364.75.75 0 0 1-1.06 1.06 6 6 0 0 1 0-8.484.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/>
        </svg>
      </a>
    </nav>

    <!-- Actions header : hub (desktop) + burger (mobile) -->
    <div class="header-actions">

      <!-- Hub icon — desktop uniquement -->
      <a href="{{ g.hub.url }}" target="_blank" rel="noopener noreferrer"
         class="nav-hub"
         aria-label="{{ g.hub.label }}"
         data-tooltip="{{ g.hub.label }}">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 6a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3v2.25a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3V6Zm-9.75 9.75a3 3 0 0 1 3-3h2.25a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-2.25Zm9.75 0a3 3 0 0 1 3-3H18a3 3 0 0 1 3 3V18a3 3 0 0 1-3 3h-2.25a3 3 0 0 1-3-3v-2.25Z" clip-rule="evenodd"/>
        </svg>
      </a>

      <!-- Burger mobile -->
      <button type="button" class="nav-toggle" aria-controls="site-nav" aria-expanded="false" aria-label="Ouvrir le menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

  </div>
</header>
